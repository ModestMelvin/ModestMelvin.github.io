<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bouncing Box</title>
    <script src="jquery.min.js"></script>
    <style>
      :root {
        --ui-height: 48px;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      .board {
        height: 100vh;
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, #eef 0%, #cfe 100%);
      }

      .box {
        width: 70px;
        height: 70px;
        background-color: teal;
        font-size: 300%;
        line-height: 70px;
        color: white;
        font-weight: 700;
        text-align: center;
        user-select: none;
        display: block;
        position: absolute;
        top: 120px;
        left: 0px;
        border-radius: 8px;
        transition: transform 120ms ease;
      }

      .box.bounce {
        transform: scale(1.15);
      }

      .ui {
        position: fixed;
        left: 0;
        right: 0;
        height: var(--ui-height);
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 12px;
        z-index: 50;
      }
      .ui .item {
        font-weight: 700;
      }
    </style>
    <!-- 	<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script> -->
  </head>

  <body class="board">
    <div class="ui">
      <div class="item">Score: <span id="score">0</span></div>
    </div>

    <!-- HTML for the box -->
    <div class="box">?</div>

    <script>
      (function () {
        "use strict";
        /* global jQuery */

        //////////////////////////////////////////////////////////////////
        /////////////////// SETUP DO NOT DELETE //////////////////////////
        //////////////////////////////////////////////////////////////////

        var box = jQuery(".box"); // reference to the HTML .box element
        var board = jQuery(".board"); // reference to the HTML .board element
        var boardWidth = board.width(); // the maximum X-Coordinate of the screen

        // update the boardWidth variable when the window is resized
        jQuery(window).on("resize", function () {
          boardWidth = board.width();
        });

        // Every 50 milliseconds, call the update Function (see below)
        setInterval(update, 50);

        // Every time the box is clicked, call the handleBoxClick Function (see below)
        box.on("click", handleBoxClick);

        // moves the Box to a new position on the screen along the X-Axis
        function moveBoxTo(newPositionX) {
          box.css("left", newPositionX);
        }

        // changes the text displayed on the Box
        function changeBoxText(newText) {
          box.text(newText);
        }

        //////////////////////////////////////////////////////////////////
        /////////////////// YOUR CODE BELOW HERE /////////////////////////
        //////////////////////////////////////////////////////////////////

        // game variables
        var positionX = 0;
        var points = 0;
        var speed = 12;
        var gameRunning = true;

        var scoreEl = jQuery("#score");

        scoreEl.text(points);

        // update loop called by setInterval above
        function update() {
          if (!gameRunning) return;

          var boxWidth = box.outerWidth();

          positionX += speed;
          moveBoxTo(positionX);

          if (positionX > boardWidth - boxWidth) {
            positionX = boardWidth - boxWidth;
            speed = -Math.abs(speed);
            box.addClass("bounce");
            setTimeout(function () {
              box.removeClass("bounce");
            }, 120);
          }

          if (positionX < 0) {
            positionX = 0;
            speed = Math.abs(speed);
            box.addClass("bounce");
            setTimeout(function () {
              box.removeClass("bounce");
            }, 120);
          }
        }

        function handleBoxClick() {
          if (!gameRunning) return;

          positionX = 0;
          points += 1;
          scoreEl.text(points);
          speed = Math.abs(speed) + 1;
          box.addClass("bounce");
          setTimeout(function () {
            box.removeClass("bounce");
          }, 120);
        }
      })();
    </script>
  </body>
</html>
